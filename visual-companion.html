<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开屏动画方案预览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    .fade-in-up {
      animation: fadeInUp 1s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    .delay-100 { animation-delay: 0.1s; }
    .delay-500 { animation-delay: 0.5s; }
    .delay-900 { animation-delay: 0.9s; }
    .delay-1300 { animation-delay: 1.3s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

  <div class="flex gap-8 max-w-5xl w-full">
    <!-- 控制面板 -->
    <div class="w-1/3 bg-white p-6 rounded-xl shadow-lg flex flex-col gap-4">
      <h2 class="text-xl font-bold mb-4">选择开屏视觉方案</h2>
      <button onclick="setTheme('minimal')" class="px-4 py-3 text-left rounded-lg border hover:bg-gray-50 focus:ring-2 ring-blue-500 transition-all">
        <div class="font-bold text-gray-900">方案 A: 极简留白 (Minimal)</div>
        <div class="text-sm text-gray-500 mt-1">贴合当前项目的主题色（米白背景，医疗蓝文字），专业冷静，过渡自然。</div>
      </button>
      <button onclick="setTheme('tech-blue')" class="px-4 py-3 text-left rounded-lg border hover:bg-gray-50 focus:ring-2 ring-blue-500 transition-all">
        <div class="font-bold text-gray-900">方案 B: 科技医疗蓝 (Tech Blue)</div>
        <div class="text-sm text-gray-500 mt-1">深蓝渐变背景，凸显"智能体"的科技感与沉浸感。</div>
      </button>
      <button onclick="setTheme('warm-green')" class="px-4 py-3 text-left rounded-lg border hover:bg-gray-50 focus:ring-2 ring-blue-500 transition-all">
        <div class="font-bold text-gray-900">方案 C: 温暖健康绿 (Warm Green)</div>
        <div class="text-sm text-gray-500 mt-1">治愈系浅绿渐变，强调"健康"与"不担心"的安心感。</div>
      </button>
      <div class="mt-4 pt-4 border-t border-gray-100">
        <button onclick="replay()" class="w-full px-4 py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition-all text-center">
          重新播放动效
        </button>
      </div>
    </div>

    <!-- 预览区域 (模拟手机) -->
    <div class="w-[400px] h-[800px] bg-black rounded-[3rem] p-4 shadow-2xl relative overflow-hidden border-8 border-gray-900 flex-shrink-0">
      <div id="preview-container" class="w-full h-full rounded-[2.2rem] overflow-hidden relative flex flex-col items-center justify-center p-8 bg-[#faf9f5] transition-colors duration-500">
        <div id="animation-content" class="w-full h-full flex flex-col items-center justify-center relative"></div>
      </div>
    </div>
  </div>

  <script>
    const themes = {
      'minimal': {
        bg: 'bg-[#faf9f5]',
        title: 'text-[#141413]',
        slogan: 'text-[#6a9bcc]',
        sub: 'text-[#b0aea5]'
      },
      'tech-blue': {
        bg: 'bg-gradient-to-br from-[#1e3a8a] to-[#3b82f6]',
        title: 'text-white',
        slogan: 'text-blue-100',
        sub: 'text-blue-200/70'
      },
      'warm-green': {
        bg: 'bg-gradient-to-br from-[#f0fdf4] to-[#dcfce7]',
        title: 'text-[#14532d]',
        slogan: 'text-[#16a34a]',
        sub: 'text-[#15803d]/70'
      }
    };

    let currentTheme = 'minimal';

    function setTheme(theme) {
      currentTheme = theme;
      const container = document.getElementById('preview-container');
      container.className = `w-full h-full rounded-[2.2rem] overflow-hidden relative flex flex-col items-center justify-center p-8 transition-colors duration-500 ${themes[theme].bg}`;
      replay();
    }

    function replay() {
      const content = document.getElementById('animation-content');
      const t = themes[currentTheme];
      
      content.innerHTML = `
        <div class="flex-1 flex flex-col items-center justify-center w-full gap-6">
          <div class="flex flex-col items-center gap-4 fade-in-up delay-100">
            <div class="w-20 h-20 rounded-2xl flex items-center justify-center shadow-lg ${currentTheme === 'tech-blue' ? 'bg-white/10 backdrop-blur' : 'bg-white'}">
              <svg class="w-10 h-10 ${currentTheme === 'tech-blue' ? 'text-white' : 'text-[#6a9bcc]'}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
              </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-wider ${t.title}" style="font-family: 'Noto Serif SC', serif;">***医生的智能体空间</h1>
          </div>

          <div class="fade-in-up delay-500 mt-8 text-center">
            <p class="text-lg font-medium tracking-widest leading-relaxed ${t.slogan}" style="font-family: 'Noto Sans SC', sans-serif;">
              让健康触手可及<br/>做自我健康第一责任人
            </p>
          </div>
        </div>

        <div class="absolute bottom-12 w-full flex flex-col items-center gap-2 fade-in-up delay-900">
          <div class="flex items-center gap-4 text-sm font-medium tracking-widest ${t.sub}">
            <span>生了病，不担心</span>
            <span class="w-1 h-1 rounded-full bg-current opacity-50"></span>
            <span>少生病，更健康</span>
          </div>
        </div>
      `;
    }

    setTheme('minimal');
  </script>
</body>
</html>
